<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Probrand TT Championship 2026 — Knockout Stage</title>

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0b0e14;
      --surface: #13181f;
      --surface2: #1a2130;
      --border: #1f2d3d;
      --accent: #00e5a0;
      --accent3: #ff5e5b;
      --gold: #ffd166;
      --muted: #5a6a7e;
      --text: #e8edf5;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background:var(--bg);
      color:var(--text);
      font-family:'DM Sans', sans-serif;
      min-height:100vh;
      overflow-x:auto;
    }

    body::before {
      content:'';
      position:fixed;
      inset:0;
      background-image:
        linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
      background-size:40px 40px;
      pointer-events:none;
      z-index:0;
    }

    .container {
      position:relative;
      z-index:1;
      padding:40px 30px 80px;
      min-width:1200px;
    }

    .header {
      text-align:center;
      margin-bottom:50px;
    }

    .header h1 {
      font-family:'Bebas Neue', sans-serif;
      font-size:clamp(3rem,7vw,5rem);
      letter-spacing:0.05em;
      line-height:0.95;
    }

    .header h1 span { color:var(--accent); }

    .subtitle {
      margin-top:14px;
      font-family:'DM Mono', monospace;
      letter-spacing:0.2em;
      text-transform:uppercase;
      color:var(--muted);
      font-size:0.8rem;
    }

    .bracket-wrapper {
      display:flex;
      justify-content:center;
      gap:70px;
      margin-top:50px;
    }

    .round {
      display:flex;
      flex-direction:column;
      gap:40px;
      min-width:260px;
    }

    .round-title {
      text-align:center;
      font-family:'Bebas Neue', sans-serif;
      letter-spacing:0.12em;
      font-size:1.7rem;
      color:var(--accent);
      margin-bottom:10px;
    }

    .match {
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:16px;
      overflow:hidden;
      transition:0.25s ease;
    }

    .match:hover {
      transform:translateY(-2px);
      border-color:rgba(0,229,160,0.4);
    }

    .player {
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:16px 18px;
      border-bottom:1px solid var(--border);
    }

    .player:last-child { border-bottom:none; }

    .player-name {
      font-weight:600;
      font-size:0.92rem;
    }

    .score {
      font-family:'Bebas Neue', sans-serif;
      font-size:2rem;
      min-width:30px;
      text-align:right;
      color:var(--muted);
    }

    .winner {
      background:rgba(0,229,160,0.08);
    }

    .winner .score { color:var(--accent); }

    .loser .score { color:var(--muted); }

    .champion-box {
      background:linear-gradient(135deg, rgba(255,209,102,0.15), rgba(0,229,160,0.1));
      border:1px solid rgba(255,209,102,0.4);
      border-radius:20px;
      padding:30px 24px;
      text-align:center;
      min-width:260px;
    }

    .champion-label {
      font-family:'DM Mono', monospace;
      letter-spacing:0.2em;
      text-transform:uppercase;
      color:var(--gold);
      font-size:0.72rem;
      margin-bottom:14px;
    }

    .champion-name {
      font-family:'Bebas Neue';
      font-size:2.6rem;
    }

    .trophy { font-size:3rem; margin-bottom:12px; }
  </style>
</head>

<body>

<div class="container">

  <div class="header">
    <h1>Knockout <span>Stage</span></h1>
    <div class="subtitle">Quarter Finals · Semi Finals · Final</div>
  </div>

  <div class="bracket-wrapper">

    <!-- QUARTERS -->
    <div class="round">
      <div class="round-title">Quarter Finals</div>

      <div class="match">
        <div class="player">
          <div class="player-name">Paul Rennalls</div>
          <div class="score">?</div>
        </div>
        <div class="player">
          <div class="player-name">Carl Holland</div>
          <div class="score">?</div>
        </div>
      </div>

      <div class="match">
        <div class="player">
          <div class="player-name">Jon Garvey</div>
          <div class="score">?</div>
        </div>
        <div class="player">
          <div class="player-name">Paul Roman</div>
          <div class="score">?</div>
        </div>
      </div>

      <div class="match">
        <div class="player">
          <div class="player-name">Hasan Haideri</div>
          <div class="score">?</div>
        </div>
        <div class="player">
          <div class="player-name">Michael Doherty</div>
          <div class="score">?</div>
        </div>
      </div>

      <div class="match">
        <div class="player">
          <div class="player-name">Keane Richards</div>
          <div class="score">?</div>
        </div>
        <div class="player">
          <div class="player-name">Rourke Smal</div>
          <div class="score">?</div>
        </div>
      </div>
    </div>

    <!-- SEMIS -->
    <div class="round">
      <div class="round-title">Semi Finals</div>

      <div class="match">
        <div class="player">
          <div class="player-name">TBD</div>
          <div class="score">?</div>
        </div>
        <div class="player">
          <div class="player-name">TBD</div>
          <div class="score">?</div>
        </div>
      </div>

      <div class="match">
        <div class="player">
          <div class="player-name">TBD</div>
          <div class="score">?</div>
        </div>
        <div class="player">
          <div class="player-name">TBD</div>
          <div class="score">?</div>
        </div>
      </div>
    </div>

    <!-- FINAL -->
    <div class="round">
      <div class="round-title">Final</div>

      <div class="match">
        <div class="player">
          <div class="player-name">TBD</div>
          <div class="score">?</div>
        </div>
        <div class="player">
          <div class="player-name">TBD</div>
          <div class="score">?</div>
        </div>
      </div>

      <div class="champion-box">
        <div class="trophy">🏆</div>
        <div class="champion-label">Champion</div>
        <div class="champion-name" id="champion">TBD</div>
      </div>
    </div>

  </div>

</div>

<script>
/* =========================================================
   ONLY EDIT THIS SECTION 👇
========================================================= */

const MATCH_DATA = [
  { p1:"Paul Rennalls", score1:null, p2:"Carl Holland", score2:null },
  { p1:"Jon Garvey", score1:null, p2:"Paul Roman", score2:null },
  { p1:"Hasan Haideri", score1:null, p2:"Michael Doherty", score2:null },
  { p1:"Keane Richards", score1:null, p2:"Rourke Smal", score2:null }
];

/* ========================================================= */

function render() {
  const matches = document.querySelectorAll(".match");

  let finalWinner = null;

  matches.forEach((el, i) => {
    const data = MATCH_DATA[i];
    if (!data) return;

    const players = el.querySelectorAll(".player");

    const p1 = players[0];
    const p2 = players[1];

    const s1 = p1.querySelector(".score");
    const s2 = p2.querySelector(".score");

    s1.textContent = data.score1 ?? "?";
    s2.textContent = data.score2 ?? "?";

    p1.classList.remove("winner","loser");
    p2.classList.remove("winner","loser");

    const played = data.score1 != null && data.score2 != null;

    if (played) {
      if (data.score1 > data.score2) {
        p1.classList.add("winner");
        p2.classList.add("loser");
        if (i === 0) finalWinner = data.p1;
      } else {
        p2.classList.add("winner");
        p1.classList.add("loser");
        if (i === 0) finalWinner = data.p2;
      }
    }
  });

  document.getElementById("champion").textContent = finalWinner || "TBD";
}

render();
</script>

</body>
</html>
