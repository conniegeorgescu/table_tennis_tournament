<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Probrand Table Tennis Championship 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0b0e14;
      --surface: #13181f;
      --surface2: #1a2130;
      --border: #1f2d3d;
      --accent: #00e5a0;
      --accent2: #00b8ff;
      --accent3: #ff5e5b;
      --gold: #ffd166;
      --silver: #b0bec5;
      --bronze: #cd7f32;
      --text: #e8edf5;
      --muted: #5a6a7e;
      --top8: rgba(0,229,160,0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Glow blobs */
    body::after {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,229,160,0.06) 0%, transparent 70%);
      top: -200px;
      right: -200px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeDown 0.7s ease both;
    }

    .ping-icon {
      font-size: 48px;
      display: block;
      margin-bottom: 12px;
      animation: spin 8s linear infinite;
    }

    @keyframes spin {
      0%, 90% { transform: rotate(0deg); }
      95% { transform: rotate(15deg); }
      100% { transform: rotate(0deg); }
    }

    .header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.4rem, 6vw, 4.2rem);
      letter-spacing: 0.04em;
      line-height: 1;
      color: var(--text);
      text-transform: uppercase;
    }

    .header h1 span {
      color: var(--accent);
    }

    .header .subtitle {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 10px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(0,229,160,0.1);
      border: 1px solid rgba(0,229,160,0.25);
      border-radius: 100px;
      padding: 5px 16px;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      color: var(--accent);
      margin-top: 16px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    /* Stats summary */
    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 40px;
      animation: fadeUp 0.7s 0.1s ease both;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }

    .stat-card .val {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.4rem;
      color: var(--accent);
      line-height: 1;
    }

    .stat-card .label {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 4px;
      font-family: 'DM Mono', monospace;
    }

    /* Table */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      animation: fadeUp 0.7s 0.2s ease both;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead tr {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }

    thead th {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 14px 16px;
      text-align: left;
      white-space: nowrap;
    }

    thead th.center { text-align: center; }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.2s;
      animation: rowFade 0.4s ease both;
    }

    tbody tr:last-child { border-bottom: none; }

    tbody tr:hover { background: rgba(255,255,255,0.025); }

    tbody tr.top8 {
      background: var(--top8);
    }

    tbody tr.top8:hover {
      background: rgba(0,229,160,0.12);
    }

    @keyframes rowFade {
      from { opacity: 0; transform: translateX(-8px); }
      to { opacity: 1; transform: translateX(0); }
    }

    td {
      padding: 13px 16px;
      font-size: 0.88rem;
      vertical-align: middle;
    }

    td.center { text-align: center; }

    /* Rank column */
    .rank-cell {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.05em;
    }

    .rank-1 { background: rgba(255,209,102,0.15); color: var(--gold); border: 1px solid rgba(255,209,102,0.3); }
    .rank-2 { background: rgba(176,190,197,0.15); color: var(--silver); border: 1px solid rgba(176,190,197,0.3); }
    .rank-3 { background: rgba(205,127,50,0.15); color: var(--bronze); border: 1px solid rgba(205,127,50,0.3); }
    .rank-other { color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.8rem; }

    /* Player name */
    .player-name {
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text);
    }

    .player-initials {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      margin-right: 10px;
      flex-shrink: 0;
      vertical-align: middle;
    }

    .player-cell {
      display: flex;
      align-items: center;
    }

    /* Numeric cells */
    .num {
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      color: var(--text);
    }

    .num.zero { color: var(--muted); }
    .num.positive { color: var(--accent); }
    .num.negative { color: var(--accent3); }

    /* Win/Loss bar */
    .wl-bar {
      display: flex;
      height: 6px;
      border-radius: 4px;
      overflow: hidden;
      background: var(--border);
      min-width: 60px;
      margin-top: 4px;
    }

    .wl-win { background: var(--accent); border-radius: 4px 0 0 4px; }
    .wl-loss { background: var(--accent3); border-radius: 0 4px 4px 0; }

    /* Top 8 badge */
    .badge-top8 {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(0,229,160,0.12);
      border: 1px solid rgba(0,229,160,0.3);
      color: var(--accent);
      border-radius: 100px;
      padding: 3px 10px;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .badge-no {
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
    }

    .badge-tbd {
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
    }

    /* Points diff */
    .diff-positive::before { content: '+'; }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 40px;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      animation: fadeUp 0.7s 0.4s ease both;
    }

    .footer a {
      color: var(--accent);
      text-decoration: none;
    }

    /* Legend */
    .legend {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 28px;
      animation: fadeUp 0.7s 0.15s ease both;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 2px;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 640px) {
      .summary { grid-template-columns: repeat(3, 1fr); gap: 10px; }
      .stat-card { padding: 14px 10px; }
      .stat-card .val { font-size: 1.8rem; }
      td, th { padding: 11px 10px; }
      .hide-mobile { display: none; }
      .player-initials { width: 26px; height: 26px; font-size: 0.6rem; margin-right: 7px; }
    }

    /* Divider between top8 and rest */
    tr.divider td {
      padding: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(0,229,160,0.3), transparent);
    }
  </style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <span class="ping-icon">🏓</span>
    <h1>Probrand <span>Ping Pong</span><br>Championship</h1>
    <p class="subtitle">Office Tournament · 2025</p>
    <div style="display:flex; justify-content:center; margin-top:14px;">
      <div class="status-pill">
        <div class="status-dot"></div>
        Season in progress
      </div>
    </div>
  </div>

  <!-- Summary stats -->
  <div class="summary" id="summary">
    <div class="stat-card">
      <div class="val" id="total-players">18</div>
      <div class="label">Players</div>
    </div>
    <div class="stat-card">
      <div class="val" id="total-games">0</div>
      <div class="label">Games Played</div>
    </div>
    <div class="stat-card">
      <div class="val" id="leader-name">TBD</div>
      <div class="label">Current Leader</div>
    </div>
  </div>

  <!-- Legend -->
  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--accent)"></div> Top 8 qualifier
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--gold)"></div> 1st place
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--silver)"></div> 2nd place
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--bronze)"></div> 3rd place
    </div>
  </div>

  <!-- Leaderboard table -->
  <div class="table-wrap">
    <table id="leaderboard">
      <thead>
        <tr>
          <th class="center" style="width:50px">Rank</th>
          <th>Player</th>
          <th class="center hide-mobile">Played</th>
          <th class="center hide-mobile">Wins</th>
          <th class="center hide-mobile">Losses</th>
          <th class="center">Pts</th>
          <th class="center hide-mobile">Diff</th>
          <th class="center">Top 8</th>
        </tr>
      </thead>
      <tbody id="tbody">
      </tbody>
    </table>
  </div>

  <div class="footer">
    <p>Last updated: <span id="last-updated"></span></p>
    <p style="margin-top:6px;">Probrand Office Tournament &mdash; May the best paddle win 🏆</p>
  </div>

</div>

<script>
  // ============================================================
  // PLAYER DATA — update this section each week
  // Fields: name, played, wins, losses, points, diff
  // Leave as 0 if no games played yet
  // ============================================================
  const players = [
    { name: "Hasan Haideri",       played: 0, wins: 0, losses: 0, points: 0, diff: 0 },
    { name: "Jon Garvey",          played: 0, wins: 0, losses: 0, points: 0, diff: 0 },
    { name: "Jonathan Ashfall",    played: 0, wins: 0, losses: 0, points: 0, diff: 0 },
    { name: "Estella Spence",      played: 0, wins: 0, losses: 0, points: 0, diff: 0 },
    { name: "Michael Doherty",     played: 0, wins: 0, losses: 0, points: 0, diff: 0 },
    { name: "Paul Rennalls",       played: 0, wins: 0, losses: 0, points: 0, diff: 0 },
    { name: "Tracey Minshull",     played: 0, wins: 0, losses: 0, points: 0, diff: 0 },
    { name: "Paul Roman",          played: 0, wins: 0, losses: 0, points: 0, diff: 0 },
    { name: "Rourke Smal",         played: 0, wins: 0, losses: 0, points: 0, diff: 0 },
    { name: "Dilip Gorania",       played: 0, wins: 0, losses: 0, points: 0, diff: 0 },
    { name: "Joshua McKenna",      played: 0, wins: 0, losses: 0, points: 0, diff: 0 },
    { name: "Patrick Burke",       played: 0, wins: 0, losses: 0, points: 0, diff: 0 },
    { name: "Keane Richards",      played: 0, wins: 0, losses: 0, points: 0, diff: 0 },
    { name: "Safyan Lodhi",        played: 0, wins: 0, losses: 0, points: 0, diff: 0 },
    { name: "Nour El Maghbari",    played: 0, wins: 0, losses: 0, points: 0, diff: 0 },
    { name: "Elisabeth Burjaw",    played: 0, wins: 0, losses: 0, points: 0, diff: 0 },
    { name: "Madison Moss-Williams", played: 0, wins: 0, losses: 0, points: 0, diff: 0 },
    { name: "Carl Holland",        played: 0, wins: 0, losses: 0, points: 0, diff: 0 },
  ];
  // ============================================================

  // Colour palette for avatars (cycles)
  const avatarColours = [
    ['#00e5a0','#0b2e22'], ['#00b8ff','#0b1e2e'], ['#ff5e5b','#2e0b0b'],
    ['#ffd166','#2e250b'], ['#a78bfa','#1a0e2e'], ['#fb923c','#2e160b'],
    ['#34d399','#0b2218'], ['#60a5fa','#0b1828'], ['#f472b6','#2e0b1e'],
    ['#facc15','#2e240b'], ['#4ade80','#0b2212'], ['#f87171','#2e0b0b'],
    ['#38bdf8','#0b1e2e'], ['#c084fc','#1e0b2e'], ['#fb7185','#2e0b14'],
    ['#a3e635','#1a2e0b'], ['#e879f9','#2e0b2e'], ['#22d3ee','#0b222e'],
  ];

  function getInitials(name) {
    return name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
  }

  function rankClass(rank) {
    if (rank === 1) return 'rank-1';
    if (rank === 2) return 'rank-2';
    if (rank === 3) return 'rank-3';
    return 'rank-other';
  }

  function rankDisplay(rank, playing) {
    if (!playing) return `<span class="rank-other">–</span>`;
    if (rank === 1) return `<div class="rank-cell rank-1">${rank}</div>`;
    if (rank === 2) return `<div class="rank-cell rank-2">${rank}</div>`;
    if (rank === 3) return `<div class="rank-cell rank-3">${rank}</div>`;
    return `<div class="rank-cell"><span class="rank-other">${rank}</span></div>`;
  }

  function diffDisplay(diff) {
    if (diff === 0) return `<span class="num zero">—</span>`;
    const cls = diff > 0 ? 'positive diff-positive' : 'negative';
    return `<span class="num ${cls}">${diff > 0 ? '+' : ''}${diff}</span>`;
  }

  function wlBar(wins, losses) {
    const total = wins + losses;
    if (total === 0) return '';
    const winPct = (wins / total * 100).toFixed(0);
    const lossPct = (100 - winPct).toFixed(0);
    return `<div class="wl-bar">
      <div class="wl-win" style="width:${winPct}%"></div>
      <div class="wl-loss" style="width:${lossPct}%"></div>
    </div>`;
  }

  function render() {
    // Sort: by points desc, then diff desc, then wins desc, then alphabetical
    const sorted = [...players].sort((a, b) => {
      const aPlayed = a.played > 0;
      const bPlayed = b.played > 0;
      if (aPlayed && !bPlayed) return -1;
      if (!aPlayed && bPlayed) return 1;
      if (b.points !== a.points) return b.points - a.points;
      if (b.diff !== a.diff) return b.diff - a.diff;
      if (b.wins !== a.wins) return b.wins - a.wins;
      return a.name.localeCompare(b.name);
    });

    // Assign ranks only to those who've played
    let rank = 0;
    sorted.forEach(p => {
      if (p.played > 0) { rank++; p._rank = rank; }
      else p._rank = null;
    });

    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';

    let dividerInserted = false;

    sorted.forEach((p, i) => {
      const isTop8 = p._rank !== null && p._rank <= 8;
      const colour = avatarColours[players.indexOf(p) % avatarColours.length];

      // Divider after rank 8
      if (!dividerInserted && p._rank === null) {
        const div = document.createElement('tr');
        div.className = 'divider';
        div.innerHTML = '<td colspan="8"></td>';
        tbody.appendChild(div);
        dividerInserted = true;
      }

      const tr = document.createElement('tr');
      if (isTop8) tr.classList.add('top8');
      tr.style.animationDelay = `${i * 0.04}s`;

      const top8Badge = p.played === 0
        ? `<span class="badge-tbd">TBD</span>`
        : isTop8
          ? `<span class="badge-top8">✦ Yes</span>`
          : `<span class="badge-no">No</span>`;

      tr.innerHTML = `
        <td class="center">${rankDisplay(p._rank, p.played > 0)}</td>
        <td>
          <div class="player-cell">
            <span class="player-initials" style="background:${colour[0]}22; color:${colour[0]}; border:1px solid ${colour[0]}44">${getInitials(p.name)}</span>
            <div>
              <div class="player-name">${p.name}</div>
              ${wlBar(p.wins, p.losses)}
            </div>
          </div>
        </td>
        <td class="center hide-mobile"><span class="num ${p.played === 0 ? 'zero' : ''}">${p.played || '—'}</span></td>
        <td class="center hide-mobile"><span class="num ${p.wins === 0 ? 'zero' : 'positive'}">${p.played ? p.wins : '—'}</span></td>
        <td class="center hide-mobile"><span class="num ${p.losses === 0 ? 'zero' : 'negative'}">${p.played ? p.losses : '—'}</span></td>
        <td class="center"><span class="num ${p.played === 0 ? 'zero' : ''}">${p.played ? p.points : '—'}</span></td>
        <td class="center hide-mobile">${p.played ? diffDisplay(p.diff) : '<span class="num zero">—</span>'}</td>
        <td class="center">${top8Badge}</td>
      `;
      tbody.appendChild(tr);
    });

    // Update summary
    const totalGames = players.reduce((s, p) => s + p.played, 0) / 2;
    document.getElementById('total-games').textContent = Math.round(totalGames) || 0;

    const leader = sorted.find(p => p.played > 0);
    if (leader) {
      const first = leader.name.split(' ')[0];
      document.getElementById('leader-name').textContent = first;
    }

    // Last updated
    document.getElementById('last-updated').textContent = new Date().toLocaleDateString('en-GB', {
      day: 'numeric', month: 'long', year: 'numeric'
    });
  }

  render();
</script>
</body>
</html>
