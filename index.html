<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Probrand TT Championship 2026 — Knockout Stage</title>

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0b0e14;
      --surface: #13181f;
      --surface2: #1a2130;
      --border: #1f2d3d;
      --accent: #00e5a0;
      --accent3: #ff5e5b;
      --gold: #ffd166;
      --muted: #5a6a7e;
      --text: #e8edf5;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: auto;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      padding: 50px 40px 100px;
      min-width: 900px;
    }

    .header {
      text-align: center;
      margin-bottom: 50px;
    }

    .header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 7vw, 5rem);
      letter-spacing: 0.05em;
      line-height: 0.95;
    }

    .header h1 span { color: var(--accent); }

    .subtitle {
      margin-top: 14px;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 16px;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 16px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .bracket-wrapper {
      display: flex;
      justify-content: center;
      gap: 0;
      margin-top: 50px;
    }

    .round {
      display: flex;
      flex-direction: column;
      min-width: 260px;
      flex: 1;
      max-width: 320px;
    }

    .round-title {
      text-align: center;
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 0.12em;
      font-size: 1.7rem;
      color: var(--accent);
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }

    .round-title.gold { color: var(--gold); }

    .round-body {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 0 16px;
    }

    .match {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: 0.25s ease;
    }

    .match:hover {
      transform: translateY(-2px);
      border-color: rgba(0,229,160,0.35);
    }

    .player {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
    }

    .player:last-child { border-bottom: none; }

    .player-name {
      font-weight: 600;
      font-size: 0.9rem;
    }

    .player-name.tbd {
      color: var(--muted);
      font-style: italic;
      font-weight: 400;
    }

    .score {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      min-width: 28px;
      text-align: right;
      color: var(--muted);
    }

    .winner {
      background: rgba(0,229,160,0.09);
    }

    .winner .score { color: var(--accent); }

    .loser { opacity: 0.45; }

    .champion-box {
      background: linear-gradient(135deg, rgba(255,209,102,0.12), rgba(0,229,160,0.08));
      border: 1px solid rgba(255,209,102,0.35);
      border-radius: 20px;
      padding: 28px 20px;
      text-align: center;
      margin: 14px 16px 0;
    }

    .champion-label {
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      font-size: 0.72rem;
      margin-bottom: 12px;
    }

    .champion-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.4rem;
      color: var(--text);
    }

    .trophy { font-size: 2.6rem; margin-bottom: 10px; }

    /* vertical spacing for semis and final to align with QF pairs */
    .semis-body { padding-top: 50px; gap: 92px !important; }
    .final-body { padding-top: 148px; }
  </style>
</head>

<body>

<div class="container">

  <div class="header">
    <span style="font-size:3rem;">🏓</span>
    <h1>Probrand <span>Table Tennis</span><br>Championship</h1>
    <p class="subtitle">Office Tournament · 2026</p>
    <div style="display:flex; justify-content:center; margin-top:14px;">
      <div class="status-pill">
        <div class="status-dot"></div>
        Quarter Finals · Semi Finals · Final
      </div>
    </div>
  </div>

  <div class="bracket-wrapper" id="bracket"></div>

</div>

<script>
/* ==========================================================
   EDIT SCORES HERE 👇
   Set scores to null if the match hasn't been played yet.
========================================================== */

const QF = [
  { p1:"Paul Rennalls", s1:11, p2:"Carl Holland",    s2:2 },
  { p1:"Jon Garvey",    s1:11,   p2:"Paul Roman",      s2:1    },
  { p1:"Hasan Haideri", s1:11,   p2:"Michael Doherty", s2:8    },
  { p1:"Keane Richards",s1:4,    p2:"Rourke Smal",     s2:11   }
];

const SF = [
   { p1:"Paul Rennalls", s1:10, p2:"Jon Garvey",    s2:12 },
  { p1:"Hasan Haideri",    s1:6,   p2:"Rourke Smal",      s2:11    },
];

const FIN = { s1:null, s2:null };

/* ========================================================== */

function getWinner(match, p1, p2) {
  if (match.s1 == null || match.s2 == null) return null;
  return match.s1 > match.s2 ? p1 : p2;
}

function buildMatch(p1, s1, p2, s2) {
  const played = s1 != null && s2 != null;
  const w1 = played && s1 > s2;
  const w2 = played && s2 > s1;

  const row = (name, score, isWinner, isLoser) => {
    const cls = isWinner ? 'winner' : (isLoser ? 'loser' : '');
    const nameCls = (!name || name === 'TBD') ? 'tbd' : '';
    return `<div class="player ${cls}">
      <div class="player-name ${nameCls}">${name || 'TBD'}</div>
      <div class="score">${score ?? '?'}</div>
    </div>`;
  };

  return `<div class="match">
    ${row(p1, s1, w1, played && !w1)}
    ${row(p2, s2, w2, played && !w2)}
  </div>`;
}

function render() {
  const qfW = QF.map(m => getWinner(m, m.p1, m.p2));

  const sf0p1 = qfW[0] || 'TBD';
  const sf0p2 = qfW[1] || 'TBD';
  const sf1p1 = qfW[2] || 'TBD';
  const sf1p2 = qfW[3] || 'TBD';

  const sfW0 = getWinner(SF[0], sf0p1, sf0p2);
  const sfW1 = getWinner(SF[1], sf1p1, sf1p2);

  const finP1 = sfW0 || 'TBD';
  const finP2 = sfW1 || 'TBD';
  const champ = getWinner(FIN, finP1, finP2);

  document.getElementById('bracket').innerHTML = `

    <!-- QUARTER FINALS -->
    <div class="round">
      <div class="round-title">Quarter Finals</div>
      <div class="round-body">
        ${buildMatch(QF[0].p1, QF[0].s1, QF[0].p2, QF[0].s2)}
        ${buildMatch(QF[1].p1, QF[1].s1, QF[1].p2, QF[1].s2)}
        ${buildMatch(QF[2].p1, QF[2].s1, QF[2].p2, QF[2].s2)}
        ${buildMatch(QF[3].p1, QF[3].s1, QF[3].p2, QF[3].s2)}
      </div>
    </div>

    <!-- SEMI FINALS -->
    <div class="round">
      <div class="round-title">Semi Finals</div>
      <div class="round-body semis-body">
        ${buildMatch(sf0p1, SF[0].s1, sf0p2, SF[0].s2)}
        ${buildMatch(sf1p1, SF[1].s1, sf1p2, SF[1].s2)}
      </div>
    </div>

    <!-- FINAL -->
    <div class="round">
      <div class="round-title gold">Final</div>
      <div class="round-body final-body">
        ${buildMatch(finP1, FIN.s1, finP2, FIN.s2)}
        <div class="champion-box">
          <div class="trophy">🏆</div>
          <div class="champion-label">Champion</div>
          <div class="champion-name">${champ || 'TBD'}</div>
        </div>
      </div>
    </div>

  `;
}

render();
</script>

</body>
</html>
